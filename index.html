<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Secret Access</title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial, Helvetica, sans-serif;
    }

    body{
      height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      background:linear-gradient(135deg,#FFF9D2,#FFEBCC,#FFF8EC);
      overflow:hidden;
    }

    .container{
      width: 320px;
      padding: 30px;
      border-radius:25px;
      background:rgba(255,255,255,0.08);
      backdrop-filter:blur(12px);
      border:1px solid rgba(255,255,255,0.1);
      text-align:center;
      box-shadow:0 0 25px rgba(0,0,0,0.4);
    }

    p{
      color: #1e282e;
      margin-bottom:20px;
      font-size:14px;
    }

    input{
      width:100%;
      padding:14px;
      border:none;
      outline: none;
      border-radius:14px;
      background:rgba(255,255,255,0.6);
      color:rgb(0, 0, 0);
      margin-bottom: 15px;
      font-size:15px;
    }

    input::placeholder{
      color:#94a3b8;
    }

    button{
      width:100%;
      padding:14px;
      border:none;
      border-radius:14px;
      background:white;
      color:black;
      font-weight:bold;
      cursor:pointer;
      transition:0.3s;
    }

    button:hover{
      transform:scale(1.03);
    }

    .error{
      color:#ff6b6b;
      margin-top:12px;
      font-size:14px;
    }

  </style>
</head>
<body>
    <div class="container">
        <h1>ACCESS</h1>
        <p>Enter your secret code</p>
        <input type="text" id="codeInput" placeholder="Input code...">
        <button onclick="checkCode()">ENTER</button>
        <div class="error" id="errorText"></div>
    </div>

<script>
  function checkCode() {
    let code = document.getElementById("codeInput").value;
    if(code === "MOCHI123"){
        window.location.href = "flutt.html";
    }

    else{
        document.getElementById("errorText").innerText = "Wrong code!.";
    }
  }
</script>
</body>
</html>
